<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrector de Preguntas PDF</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1>Corrector de Preguntas</h1>
        <div class="controls">
            <button id="jsonFileBtn" class="btn primary-btn">1. Cargar JSON</button>
            <button id="downloadBtn" class="btn success-btn" disabled>2. Descargar JSON Corregido</button>
        </div>
        <div class="stats">
            <span id="progressText">0 / 0 Respondidas</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="questionsContainer" class="questions-grid">
            <!-- Las preguntas se inyectarán aquí JS -->
            <div class="empty-state">
                <p>Carga un archivo JSON para comenzar a corregir.</p>
                <p>Las preguntas no se guardarán hasta que descargues el archivo.</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
